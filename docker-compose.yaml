services:
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Requires the NVIDIA Container Toolkit on the host. Remove this
    # "deploy" block to run Ollama on CPU only (still works, just slower).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    container_name: nexus-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    # Pulls the model once, then exits. The backend waits for this to
    # complete so the very first query never hits a missing-model error.
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2:3b"]
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nexus-backend
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: sqlite:////app/data/nexus_ai.db
      UPLOAD_DIR: /app/data/uploads
      LOG_DIR: /app/data/logs
      CHROMA_PATH: /app/data/chroma_db
      HF_HOME: /app/data/hf_cache
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_TIMEOUT_SECONDS: "180"
      MAX_CONTEXT_TOKENS: "${MAX_CONTEXT_TOKENS:-3500}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexus-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_USE_MOCK: "false"
    restart: unless-stopped

volumes:
  ollama_data: